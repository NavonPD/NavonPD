name: Update profile art

on:
  schedule:
    - cron: '0 0 * * *' # runs every day at midnight UTC
  workflow_dispatch: # allows manual triggering

permissions:
  contents: write

jobs:
  update-art:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Fetch contribution data
        env:
          GH_PROFILE_USER: ${{ github.repository_owner }}
        run: |
          python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: |
          python scripts/render_heatmap_svg.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update contribution heatmap" && git push)
